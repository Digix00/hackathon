basePath: /
definitions:
  hackathon_internal_handler_schema_request.CreatePushTokenRequest:
    properties:
      app_version:
        type: string
      device_id:
        type: string
      platform:
        enum:
        - ios
        - android
        type: string
      push_token:
        type: string
    type: object
  hackathon_internal_handler_schema_request.CreateUserRequest:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      display_name:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
    type: object
  hackathon_internal_handler_schema_request.PostLyricRequest:
    properties:
      content:
        type: string
      encounter_id:
        type: string
    type: object
  hackathon_internal_handler_schema_request.UpdatePushTokenRequest:
    properties:
      app_version:
        type: string
      enabled:
        type: boolean
      push_token:
        type: string
    type: object
  hackathon_internal_handler_schema_request.UpdateSettingsRequest:
    properties:
      announcement_notification_enabled:
        type: boolean
      batch_notification_enabled:
        type: boolean
      ble_enabled:
        type: boolean
      comment_notification_enabled:
        type: boolean
      detection_distance:
        type: integer
      encounter_notification_enabled:
        type: boolean
      like_notification_enabled:
        type: boolean
      location_enabled:
        type: boolean
      notification_enabled:
        type: boolean
      notification_frequency:
        enum:
        - immediate
        - hourly
        - daily
        type: string
      profile_visible:
        type: boolean
      schedule_enabled:
        type: boolean
      schedule_end_time:
        type: string
      schedule_start_time:
        type: string
      theme_mode:
        enum:
        - light
        - dark
        - system
        type: string
      track_visible:
        type: boolean
    type: object
  hackathon_internal_handler_schema_request.UpdateUserRequest:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      display_name:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
    type: object
  hackathon_internal_handler_schema_response.BleToken:
    properties:
      expires_at:
        type: string
      token:
        type: string
    required:
    - expires_at
    - token
    type: object
  hackathon_internal_handler_schema_response.BleTokenResponse:
    properties:
      ble_token:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.BleToken'
    required:
    - ble_token
    type: object
  hackathon_internal_handler_schema_response.BleTokenUser:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      id:
        type: string
    required:
    - display_name
    - id
    type: object
  hackathon_internal_handler_schema_response.BleTokenUserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenUser'
    required:
    - user
    type: object
  hackathon_internal_handler_schema_response.Device:
    properties:
      device_id:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      platform:
        enum:
        - ios
        - android
        type: string
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.DeviceResponse:
    properties:
      device:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.Device'
    type: object
  hackathon_internal_handler_schema_response.GeneratedSongItem:
    properties:
      audio_url:
        type: string
      duration_sec:
        type: integer
      id:
        type: string
      mood:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.LyricChainDetailItem:
    properties:
      id:
        type: string
      participant_count:
        type: integer
      status:
        enum:
        - pending
        - generating
        - completed
        - failed
        type: string
      threshold:
        type: integer
    type: object
  hackathon_internal_handler_schema_response.LyricChainDetailResponse:
    properties:
      chain:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.LyricChainDetailItem'
      entries:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.LyricEntryWithUserItem'
        type: array
      song:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.GeneratedSongItem'
    type: object
  hackathon_internal_handler_schema_response.LyricChainItem:
    properties:
      id:
        type: string
      participant_count:
        type: integer
      status:
        enum:
        - pending
        - generating
        - completed
        - failed
        type: string
      threshold:
        type: integer
    type: object
  hackathon_internal_handler_schema_response.LyricEntryItem:
    properties:
      chain_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      sequence_num:
        type: integer
    type: object
  hackathon_internal_handler_schema_response.LyricEntryWithUserItem:
    properties:
      content:
        type: string
      sequence_num:
        type: integer
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.UserBrief'
    type: object
  hackathon_internal_handler_schema_response.MusicAuthorizeResponse:
    properties:
      authorize_url:
        type: string
      state:
        type: string
    type: object
  hackathon_internal_handler_schema_response.MusicConnectionItem:
    properties:
      expires_at:
        type: string
      provider:
        enum:
        - spotify
        - apple_music
        type: string
      provider_user_id:
        type: string
      provider_username:
        type: string
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.MusicConnectionsResponse:
    properties:
      music_connections:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.MusicConnectionItem'
        type: array
    type: object
  hackathon_internal_handler_schema_response.PaginationResult:
    properties:
      has_more:
        type: boolean
      next_cursor:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PostLyricResponse:
    properties:
      chain:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.LyricChainItem'
      lyric_entry:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.LyricEntryItem'
    type: object
  hackathon_internal_handler_schema_response.PublicTrack:
    properties:
      artist_name:
        type: string
      artwork_url:
        type: string
      id:
        type: string
      preview_url:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PublicUser:
    properties:
      age_range:
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthplace:
        type: string
      display_name:
        type: string
      encounter_count:
        type: integer
      id:
        type: string
      shared_track:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicTrack'
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PublicUserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicUser'
    type: object
  hackathon_internal_handler_schema_response.Settings:
    properties:
      announcement_notification_enabled:
        type: boolean
      batch_notification_enabled:
        type: boolean
      ble_enabled:
        type: boolean
      comment_notification_enabled:
        type: boolean
      detection_distance:
        type: integer
      encounter_notification_enabled:
        type: boolean
      like_notification_enabled:
        type: boolean
      location_enabled:
        type: boolean
      notification_enabled:
        type: boolean
      notification_frequency:
        enum:
        - immediate
        - hourly
        - daily
        type: string
      profile_visible:
        type: boolean
      schedule_enabled:
        type: boolean
      schedule_end_time:
        type: string
      schedule_start_time:
        type: string
      theme_mode:
        enum:
        - light
        - dark
        - system
        type: string
      track_visible:
        type: boolean
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.SettingsResponse:
    properties:
      settings:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.Settings'
    type: object
  hackathon_internal_handler_schema_response.TrackDetailItem:
    properties:
      album_name:
        type: string
      artist_name:
        type: string
      artwork_url:
        type: string
      duration_ms:
        type: integer
      id:
        type: string
      preview_url:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.TrackDetailResponse:
    properties:
      track:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.TrackDetailItem'
    type: object
  hackathon_internal_handler_schema_response.TrackItem:
    properties:
      artist_name:
        type: string
      artwork_url:
        type: string
      id:
        type: string
      preview_url:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.TrackSearchResponse:
    properties:
      pagination:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.PaginationResult'
      tracks:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.TrackItem'
        type: array
    type: object
  hackathon_internal_handler_schema_response.User:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.UserBrief:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      id:
        type: string
    type: object
  hackathon_internal_handler_schema_response.UserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.User'
    type: object
  internal_handler.errorBody:
    properties:
      code:
        type: string
      details:
        type: object
      message:
        type: string
    type: object
  internal_handler.errorResponse:
    properties:
      error:
        $ref: '#/definitions/internal_handler.errorBody'
    type: object
host: localhost:8000
info:
  contact: {}
  description: MusicSwapping バックエンド API
  title: MusicSwapping API
  version: "1.0"
paths:
  /api/v1/ble-tokens:
    post:
      description: 現在ログインしているユーザーの新規 BLE トークンを発行する（24時間有効）
      operationId: createBleToken
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークン発行
      tags:
      - ble-tokens
  /api/v1/ble-tokens/{token}/user:
    get:
      description: 指定した BLE トークンに紐づくユーザーの公開プロフィールを取得する
      operationId: getUserByBleToken
      parameters:
      - description: 対象の BLE トークン
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークンからユーザー情報取得
      tags:
      - ble-tokens
  /api/v1/ble-tokens/current:
    get:
      description: 現在ログインしているユーザーの有効な最新の BLE トークンを取得する
      operationId: getCurrentBleToken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 有効な BLE トークン取得
      tags:
      - ble-tokens
  /api/v1/lyrics:
    post:
      consumes:
      - application/json
      description: エンカウントをきっかけに歌詞チェーンへ1行を投稿する。チェーンが threshold に達すると楽曲生成ジョブが登録される。
      operationId: postLyric
      parameters:
      - description: 歌詞投稿リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.PostLyricRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.PostLyricResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 歌詞投稿
      tags:
      - lyrics
  /api/v1/lyrics/chains/{chain_id}:
    get:
      description: チェーンの詳細と全歌詞エントリを返す。completed 時のみ song フィールドが含まれる。
      operationId: getLyricChain
      parameters:
      - description: チェーン ID
        in: path
        name: chain_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.LyricChainDetailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 歌詞チェーン詳細取得
      tags:
      - lyrics
  /api/v1/music-connections/{provider}/authorize:
    get:
      description: 指定プロバイダーの OAuth 認可フローを開始し authorize_url を返す
      operationId: getMusicAuthorizeURL
      parameters:
      - description: spotify | apple_music
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.MusicAuthorizeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 音楽サービス OAuth 認可 URL 取得
      tags:
      - music-connections
  /api/v1/music-connections/{provider}/callback:
    get:
      description: OAuth コールバックを処理し、認可コードをトークンに交換してアプリへリダイレクト
      operationId: handleMusicCallback
      parameters:
      - description: spotify | apple_music
        in: path
        name: provider
        required: true
        type: string
      - description: 認可コード
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Found
      summary: 音楽サービス OAuth コールバック
      tags:
      - music-connections
  /api/v1/tracks/{id}:
    get:
      description: '指定トラックの詳細を返す（ID: <provider>:track:<external_id>）'
      operationId: getTrack
      parameters:
      - description: 'トラック ID（例: spotify:track:123）'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.TrackDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: トラック詳細取得
      tags:
      - tracks
  /api/v1/tracks/search:
    get:
      description: Spotify Web API にプロキシするトラック検索
      operationId: searchTracks
      parameters:
      - description: 検索キーワード
        in: query
        name: q
        required: true
        type: string
      - description: 件数（省略時20、最大50）
        in: query
        name: limit
        type: integer
      - description: 次ページカーソル
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.TrackSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: トラック検索
      tags:
      - tracks
  /api/v1/users:
    post:
      consumes:
      - application/json
      description: Firebase 認証済みの新規ユーザーを登録する（初回ログイン時に一度だけ呼ぶ）
      operationId: createUser
      parameters:
      - description: ユーザー作成リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: ユーザー作成
      tags:
      - users
  /api/v1/users/{id}:
    get:
      description: 指定した ID の公開プロフィールを返す
      operationId: getUserByID
      parameters:
      - description: 対象ユーザー ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 他ユーザーのプロフィール取得
      tags:
      - users
  /api/v1/users/me:
    delete:
      description: DB レコードと Firebase アカウントを削除する（Firebase 削除はベストエフォート）
      operationId: deleteMe
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 自分のアカウント削除
      tags:
      - users
    get:
      description: 認証中のユーザー自身のプロフィールを返す
      operationId: getMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 自分のユーザー情報取得
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: 指定したフィールドだけを部分更新する（null フィールドは変更しない）
      operationId: patchMe
      parameters:
      - description: プロフィール更新リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
