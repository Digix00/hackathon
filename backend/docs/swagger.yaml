basePath: /
definitions:
  hackathon_internal_handler_schema_request.CreateEncounterRequest:
    properties:
      occurred_at:
        type: string
      rssi:
        type: integer
      target_ble_token:
        type: string
      type:
        type: string
    type: object
  hackathon_internal_handler_schema_request.CreatePushTokenRequest:
    properties:
      app_version:
        type: string
      device_id:
        type: string
      platform:
        enum:
        - ios
        - android
        type: string
      push_token:
        type: string
    type: object
  hackathon_internal_handler_schema_request.CreateUserRequest:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      display_name:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
    type: object
  hackathon_internal_handler_schema_request.UpdatePushTokenRequest:
    properties:
      app_version:
        type: string
      enabled:
        type: boolean
      push_token:
        type: string
    type: object
  hackathon_internal_handler_schema_request.UpdateSettingsRequest:
    properties:
      announcement_notification_enabled:
        type: boolean
      batch_notification_enabled:
        type: boolean
      ble_enabled:
        type: boolean
      comment_notification_enabled:
        type: boolean
      detection_distance:
        type: integer
      encounter_notification_enabled:
        type: boolean
      like_notification_enabled:
        type: boolean
      location_enabled:
        type: boolean
      notification_enabled:
        type: boolean
      notification_frequency:
        enum:
        - immediate
        - hourly
        - daily
        type: string
      profile_visible:
        type: boolean
      schedule_enabled:
        type: boolean
      schedule_end_time:
        type: string
      schedule_start_time:
        type: string
      theme_mode:
        enum:
        - light
        - dark
        - system
        type: string
      track_visible:
        type: boolean
    type: object
  hackathon_internal_handler_schema_request.UpdateUserRequest:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      display_name:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
    type: object
  hackathon_internal_handler_schema_response.BleToken:
    properties:
      expires_at:
        type: string
      token:
        type: string
    required:
    - expires_at
    - token
    type: object
  hackathon_internal_handler_schema_response.BleTokenResponse:
    properties:
      ble_token:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.BleToken'
    required:
    - ble_token
    type: object
  hackathon_internal_handler_schema_response.BleTokenUser:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      id:
        type: string
    required:
    - display_name
    - id
    type: object
  hackathon_internal_handler_schema_response.BleTokenUserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenUser'
    required:
    - user
    type: object
  hackathon_internal_handler_schema_response.Device:
    properties:
      device_id:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      platform:
        enum:
        - ios
        - android
        type: string
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.DeviceResponse:
    properties:
      device:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.Device'
    type: object
  hackathon_internal_handler_schema_response.EncounterDetail:
    properties:
      id:
        type: string
      occurred_at:
        type: string
      tracks:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterTrack'
        type: array
      type:
        enum:
        - ble
        - location
        type: string
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterUser'
    type: object
  hackathon_internal_handler_schema_response.EncounterDetailResponse:
    properties:
      encounter:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterDetail'
    type: object
  hackathon_internal_handler_schema_response.EncounterListItem:
    properties:
      id:
        type: string
      is_read:
        type: boolean
      occurred_at:
        type: string
      tracks:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterTrack'
        type: array
      type:
        enum:
        - ble
        - location
        type: string
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterUser'
    type: object
  hackathon_internal_handler_schema_response.EncounterListResponse:
    properties:
      encounters:
        items:
          $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterListItem'
        type: array
      pagination:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.Pagination'
    type: object
  hackathon_internal_handler_schema_response.EncounterResponse:
    properties:
      encounter:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterSummary'
    type: object
  hackathon_internal_handler_schema_response.EncounterSummary:
    properties:
      id:
        type: string
      occurred_at:
        type: string
      type:
        enum:
        - ble
        - location
        type: string
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterUser'
    type: object
  hackathon_internal_handler_schema_response.EncounterTrack:
    properties:
      artist_name:
        type: string
      artwork_url:
        type: string
      id:
        type: string
      preview_url:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.EncounterUser:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      id:
        type: string
    type: object
  hackathon_internal_handler_schema_response.Pagination:
    properties:
      has_more:
        type: boolean
      next_cursor:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PublicTrack:
    properties:
      artist_name:
        type: string
      artwork_url:
        type: string
      id:
        type: string
      preview_url:
        type: string
      title:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PublicUser:
    properties:
      age_range:
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthplace:
        type: string
      display_name:
        type: string
      encounter_count:
        type: integer
      id:
        type: string
      shared_track:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicTrack'
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.PublicUserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicUser'
    type: object
  hackathon_internal_handler_schema_response.Settings:
    properties:
      announcement_notification_enabled:
        type: boolean
      batch_notification_enabled:
        type: boolean
      ble_enabled:
        type: boolean
      comment_notification_enabled:
        type: boolean
      detection_distance:
        type: integer
      encounter_notification_enabled:
        type: boolean
      like_notification_enabled:
        type: boolean
      location_enabled:
        type: boolean
      notification_enabled:
        type: boolean
      notification_frequency:
        enum:
        - immediate
        - hourly
        - daily
        type: string
      profile_visible:
        type: boolean
      schedule_enabled:
        type: boolean
      schedule_end_time:
        type: string
      schedule_start_time:
        type: string
      theme_mode:
        enum:
        - light
        - dark
        - system
        type: string
      track_visible:
        type: boolean
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.SettingsResponse:
    properties:
      settings:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.Settings'
    type: object
  hackathon_internal_handler_schema_response.User:
    properties:
      age_visibility:
        enum:
        - hidden
        - exact
        - by-10
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      birthdate:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      prefecture_id:
        type: string
      sex:
        enum:
        - male
        - female
        - other
        - no-answer
        type: string
      updated_at:
        type: string
    type: object
  hackathon_internal_handler_schema_response.UserResponse:
    properties:
      user:
        $ref: '#/definitions/hackathon_internal_handler_schema_response.User'
    type: object
  internal_handler.errorBody:
    properties:
      code:
        type: string
      details:
        type: object
      message:
        type: string
    type: object
  internal_handler.errorResponse:
    properties:
      error:
        $ref: '#/definitions/internal_handler.errorBody'
    type: object
host: localhost:8000
info:
  contact: {}
  description: MusicSwapping バックエンド API
  title: MusicSwapping API
  version: "1.0"
paths:
  /api/v1/ble-tokens:
    post:
      description: 現在ログインしているユーザーの新規 BLE トークンを発行する（24時間有効）
      operationId: createBleToken
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークン発行
      tags:
      - ble-tokens
  /api/v1/ble-tokens/{token}/user:
    get:
      description: 指定した BLE トークンに紐づくユーザーの公開プロフィールを取得する
      operationId: getUserByBleToken
      parameters:
      - description: 対象の BLE トークン
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークンからユーザー情報取得
      tags:
      - ble-tokens
  /api/v1/ble-tokens/current:
    get:
      description: 現在ログインしているユーザーの有効な最新の BLE トークンを取得する
      operationId: getCurrentBleToken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 有効な BLE トークン取得
      tags:
      - ble-tokens
  /api/v1/encounters:
    get:
      description: 認証ユーザーのすれ違い履歴を取得する
      operationId: listEncounters
      parameters:
      - description: 取得件数（省略時 20, 最大 50）
        in: query
        name: limit
        type: integer
      - description: 次ページ取得用カーソル
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い履歴一覧取得
      tags:
      - encounters
    post:
      consumes:
      - application/json
      description: BLE 検出トークンからすれ違いを登録する（同一ペア・短時間内は冪等）
      operationId: createEncounter
      parameters:
      - description: すれ違い登録リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.CreateEncounterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い登録
      tags:
      - encounters
  /api/v1/encounters/{id}:
    get:
      description: 指定した ID のすれ違い詳細を取得する
      operationId: getEncounterByID
      parameters:
      - description: 対象すれ違い ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い詳細取得
      tags:
      - encounters
  /api/v1/users:
    post:
      consumes:
      - application/json
      description: Firebase 認証済みの新規ユーザーを登録する（初回ログイン時に一度だけ呼ぶ）
      operationId: createUser
      parameters:
      - description: ユーザー作成リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: ユーザー作成
      tags:
      - users
  /api/v1/users/{id}:
    get:
      description: 指定した ID の公開プロフィールを返す
      operationId: getUserByID
      parameters:
      - description: 対象ユーザー ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.PublicUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 他ユーザーのプロフィール取得
      tags:
      - users
  /api/v1/users/me:
    delete:
      description: DB レコードと Firebase アカウントを削除する（Firebase 削除はベストエフォート）
      operationId: deleteMe
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 自分のアカウント削除
      tags:
      - users
    get:
      description: 認証中のユーザー自身のプロフィールを返す
      operationId: getMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 自分のユーザー情報取得
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: 指定したフィールドだけを部分更新する（null フィールドは変更しない）
      operationId: patchMe
      parameters:
      - description: プロフィール更新リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 自分のプロフィール更新
      tags:
      - users
  /api/v1/users/me/push-tokens:
    post:
      consumes:
      - application/json
      description: device_id が既存なら更新して 200、新規なら 201 を返す
      operationId: createPushToken
      parameters:
      - description: プッシュトークン登録リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.CreatePushTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 既存デバイスを更新
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.DeviceResponse'
        "201":
          description: 新規デバイスを登録
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.DeviceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: プッシュトークン登録（upsert）
      tags:
      - push-tokens
  /api/v1/users/me/push-tokens/{id}:
    delete:
      description: 指定デバイスのレコードを削除する
      operationId: deletePushToken
      parameters:
      - description: デバイス ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: プッシュトークン削除
      tags:
      - push-tokens
    patch:
      consumes:
      - application/json
      description: 指定デバイスのトークン・有効フラグ・アプリバージョンを部分更新する
      operationId: patchPushToken
      parameters:
      - description: デバイス ID
        in: path
        name: id
        required: true
        type: string
      - description: プッシュトークン更新リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.UpdatePushTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.DeviceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
