host: localhost:8000
info:
  contact: {}
  description: MusicSwapping バックエンド API
  title: MusicSwapping API
  version: "1.0"
paths:
  /api/v1/ble-tokens:
    post:
      description: 現在ログインしているユーザーの新規 BLE トークンを発行する（24時間有効）
      operationId: createBleToken
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークン発行
      tags:
      - ble-tokens
  /api/v1/ble-tokens/{token}/user:
    get:
      description: 指定した BLE トークンに紐づくユーザーの公開プロフィールを取得する
      operationId: getUserByBleToken
      parameters:
      - description: 対象の BLE トークン
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: BLE トークンからユーザー情報取得
      tags:
      - ble-tokens
  /api/v1/ble-tokens/current:
    get:
      description: 現在ログインしているユーザーの有効な最新の BLE トークンを取得する
      operationId: getCurrentBleToken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.BleTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 有効な BLE トークン取得
      tags:
      - ble-tokens
  /api/v1/encounters:
    get:
      description: 認証ユーザーのすれ違い履歴を取得する
      operationId: listEncounters
      parameters:
      - description: 取得件数（省略時 20, 最大 50）
        in: query
        name: limit
        type: integer
      - description: 次ページ取得用カーソル
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い履歴一覧取得
      tags:
      - encounters
    post:
      consumes:
      - application/json
      description: BLE 検出トークンからすれ違いを登録する（同一ペア・短時間内は冪等）
      operationId: createEncounter
      parameters:
      - description: すれ違い登録リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hackathon_internal_handler_schema_request.CreateEncounterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterResponse'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い登録
      tags:
      - encounters
  /api/v1/encounters/{id}:
    get:
      description: 指定した ID のすれ違い詳細を取得する
      operationId: getEncounterByID
      parameters:
      - description: 対象すれ違い ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.EncounterDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: すれ違い詳細取得
      tags:
      - encounters
  /api/v1/music-connections/{provider}/authorize:
    get:
      description: Spotify / Apple Music の OAuth 認可開始 URL と state を返す
      operationId: getMusicAuthorizeURL
      parameters:
      - description: provider
        enum:
        - spotify
        - apple_music
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hackathon_internal_handler_schema_response.MusicAuthorizeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 音楽サービス連携の認可 URL を取得
      tags:
      - music-connections
  /api/v1/music-connections/{provider}/callback:
    get:
      description: OAuth コールバックを処理し、アプリ deep link へリダイレクトする
      operationId: handleMusicCallback
      parameters:
      - description: provider
        enum:
        - spotify
        - apple_music
        in: path
        name: provider
        required: true
        type: string
      - description: authorization code
        in: query
        name: code
        required: true
        type: string
      - description: signed state
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Found
      summary: 音楽サービス連携のコールバック
      tags:
      - music-connections
  /api/v1/playlists:
    post:
      consumes:
      - application/json
      description: 認証済みユーザーの新規プレイリストを作成する
      operationId: createPlaylist
      parameters:
      - description: プレイリスト作成リクエスト
        in: body
