name: migrate

on:
  push:
    branches:
      - main
    paths:
      - "backend/internal/infra/rdb/model/**"
      - "backend/internal/infra/rdb/migrate.go"
      - "backend/cmd/migrate/**"
      - ".github/workflows/migrate.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push migrate image
        env:
          IMAGE: asia-northeast1-docker.pkg.dev/${{ vars.TF_PROJECT_ID }}/app/migrate
        run: |
          docker build \
            -f backend/cmd/migrate/Dockerfile.prod \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy migrate Service
        run: |
          gcloud run services update migrate \
            --image asia-northeast1-docker.pkg.dev/${{ vars.TF_PROJECT_ID }}/app/migrate:${{ github.sha }} \
            --region asia-northeast1 \
            --project ${{ vars.TF_PROJECT_ID }}

      - name: Run DB migration
        run: |
          MIGRATE_URL=$(gcloud run services describe migrate \
            --region asia-northeast1 \
            --project ${{ vars.TF_PROJECT_ID }} \
            --format='value(status.url)')
          # WIF 認証では --audiences 単独指定が使えないため SA を明示的に impersonate してIDトークンを取得
          TOKEN=$(gcloud auth print-identity-token \
            --impersonate-service-account=${{ secrets.GCP_TERRAFORM_SA }} \
            --audiences="$MIGRATE_URL")
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$MIGRATE_URL/"
