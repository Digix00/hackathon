name: Discord Notifications

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, review_requested, reopened, closed]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Notify Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const notify = require('./.github/discord-notify.js');
            await notify({ context, core, fs: require('fs') });
