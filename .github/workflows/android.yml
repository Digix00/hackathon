name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

defaults:
  run:
    working-directory: android

permissions:
  contents: read

jobs:
  # ── 静的解析 ──────────────────────────────────────────────────────
  lint:
    name: ktlint + Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write placeholder google-services.json for CI
        run: |
          cp app/google-services.json.example app/src/dev/google-services.json
          cp app/google-services.json.example app/src/prod/google-services.json

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        run: ./gradlew detektDevDebug

  # ── ユニットテスト ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write placeholder google-services.json for CI
        run: |
          cp app/google-services.json.example app/src/dev/google-services.json
          cp app/google-services.json.example app/src/prod/google-services.json

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: android/app/build/reports/tests/

  # ── ビルド確認（APK） ─────────────────────────────────────────
  build:
    name: Build devDebug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write placeholder google-services.json for CI
        run: |
          cp app/google-services.json.example app/src/dev/google-services.json
          cp app/google-services.json.example app/src/prod/google-services.json

      - name: Build devDebug APK
        run: ./gradlew assembleDevDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: android/app/build/outputs/apk/dev/debug/*.apk
