name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/main/**"
      - ".github/workflows/tf-plan.yml"

jobs:
  plan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: infra/main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup tfcmt
        uses: shmokmt/actions-setup-tfcmt@v2
        with:
          version: v4.6.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_VAR_project_id: ${{ vars.TF_PROJECT_ID }}
          TF_VAR_github_repo: ${{ vars.TF_GITHUB_REPO }}
          TF_VAR_api_domain: ${{ vars.TF_API_DOMAIN }}
        run: tfcmt plan -patch -- terraform plan -input=false
