name: deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push server image
        env:
          IMAGE: asia-northeast1-docker.pkg.dev/${{ vars.TF_PROJECT_ID }}/app/server
        run: |
          docker build \
            -f backend/cmd/server/Dockerfile.prod \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Build and push worker image
        env:
          IMAGE: asia-northeast1-docker.pkg.dev/${{ vars.TF_PROJECT_ID }}/app/worker
        run: |
          docker build \
            -f backend/cmd/worker/Dockerfile.prod \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: infra/main
        run: terraform init

      - name: Terraform Apply (image タグを更新)
        working-directory: infra/main
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ vars.TF_PROJECT_ID }}" \
            -var="github_repo=${{ vars.TF_GITHUB_REPO }}" \
            -var="server_image_tag=${{ github.sha }}" \
            -var="worker_image_tag=${{ github.sha }}"
